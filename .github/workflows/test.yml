name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: node --test tests/

      - name: Check syntax
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./tests/*"); do
            node --check "$f" || exit 1
          done
          echo "✅ All files syntax OK"
