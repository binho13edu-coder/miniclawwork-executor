name: Code Executor
on:
  repository_dispatch:
    types: [run-python]
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode and run
        env:
          CODE_B64: ${{ github.event.client_payload.code }}
        run: |
          echo "$CODE_B64" | base64 -d > script.py
          timeout 30 python script.py > output.txt 2>&1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.client_payload.task_id }}
          path: output.txt
          retention-days: 1
