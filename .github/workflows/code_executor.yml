name: Code Executor

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Code to execute'
        required: true
  repository_dispatch:
    types: [run-python]

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare and run
        env:
          CODE_INPUT: ${{ github.event.inputs.code || github.event.client_payload.code }}
        run: |
          echo "$CODE_INPUT" > script.py
          pip install requests
          timeout 30 python script.py > output.txt 2>&1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.client_payload.task_id || github.run_id }}
          path: output.txt
          retention-days: 1
